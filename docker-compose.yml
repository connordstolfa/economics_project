services:
  # Dagster (Orchestration)
  dagster:
    build: .
    command: dagster dev -m orchestration.definitions -h 0.0.0.0 -p 3000
    volumes:
      - .:/opt/dagster/app
      - ./seattle_econ.duckdb:/opt/dagster/app/seattle_econ.duckdb
    ports:
      - "3000:3000"
    environment:
      - PYTHONPATH=/opt/dagster/app
      - DAGSTER_HOME=/opt/dagster/dagster_home

  # FastAPI
  backend:
    build: .
    command: uvicorn app.backend.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/opt/dagster/app
    ports:
      - "8000:8000"
    depends_on:
      - dagster
    environment:
      - PYTHONPATH=/opt/dagster/app  # <--- Add this line!

  # Frontend (Run Through Streamlit)
  frontend:
    build: .
    command: streamlit run app/frontend/homepage.py --server.port 8501 --server.address 0.0.0.0
    volumes:
      - .:/opt/dagster/app
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
